<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — Sistema de Estudiantes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0e10;
    --surface:  #13161a;
    --border:   #242830;
    --accent:   #c8a96e;
    --text:     #e8e2d9;
    --muted:    #6b7280;
    --error:    #e05c5c;
    --input-bg: #0f1114;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(200,169,110,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,.07) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 460px 1fr;
    grid-template-rows: 1fr auto 1fr;
    align-items: center; justify-items: center;
    padding: 40px 24px;
  }

  .watermark {
    grid-column: 1; grid-row: 1;
    align-self: start; justify-self: start;
    padding: 24px 32px;
    font-family: 'DM Serif Display', serif;
    font-size: 13px; color: var(--muted);
    letter-spacing: .12em; text-transform: uppercase;
  }

  .card {
    grid-column: 2; grid-row: 1 / 4;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 52px 48px;
    position: relative;
    animation: slideUp .6s cubic-bezier(.22,1,.36,1) both;
  }

  .card::before {
    content: ''; position: absolute; top: -1px; right: -1px;
    width: 48px; height: 48px;
    border-top: 2px solid var(--accent); border-right: 2px solid var(--accent);
  }
  .card::after {
    content: ''; position: absolute; bottom: -1px; left: -1px;
    width: 48px; height: 48px;
    border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 20px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; font-weight: 400; line-height: 1.1;
    color: var(--text); margin-bottom: 8px;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .subtitle { font-size: 11px; color: var(--muted); letter-spacing: .06em; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 32px 0;
  }

  .field { margin-bottom: 24px; }

  label {
    display: block; font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  input[type="text"], input[type="password"] {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
    padding: 14px 16px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,169,110,.08);
  }
  input::placeholder { color: #333740; }

  /* Error desde Flask/Jinja */
  .error-msg {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--error); letter-spacing: .06em;
    margin-bottom: 20px;
    padding: 12px 14px;
    border: 1px solid rgba(224,92,92,.25);
    background: rgba(224,92,92,.05);
  }

  .btn {
    width: 100%; margin-top: 8px; padding: 16px;
    background: var(--accent); color: #0c0e10; border: none;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; transition: background .2s, transform .1s;
  }
  .btn:hover { background: #d4b87a; }
  .btn:active { transform: scale(.99); }

  .btn-inner {
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-arrow { transition: transform .2s; }
  .btn:hover .btn-arrow { transform: translateX(4px); }

  .card-footer {
    margin-top: 28px;
    display: flex; align-items: center; justify-content: flex-end;
  }
  .status-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--muted); letter-spacing: .08em;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; }

  .stamp {
    grid-column: 2; grid-row: 3; align-self: end;
    text-align: center; font-size: 10px; color: #2a2d33;
    letter-spacing: .14em; text-transform: uppercase; padding-top: 16px;
  }

  @media (max-width: 600px) {
    .page { grid-template-columns: 1fr; padding: 24px 16px; }
    .card { grid-column: 1; padding: 36px 24px; }
    .watermark { display: none; }
    .stamp { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="watermark">Sistema Académico</div>

  <div class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      Portal de acceso
    </div>
    <h1>Iniciar<br><em>sesión</em></h1>
    <p class="subtitle">Sistema de gestión de estudiantes</p>

    <div class="divider"></div>

    {% if error %}
    <div class="error-msg">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="6" cy="6" r="5.5" stroke="#e05c5c"/>
        <path d="M6 3.5v3M6 8v.5" stroke="#e05c5c" stroke-linecap="round"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/">
      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username"
               placeholder="nombre_usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn">
        <span class="btn-inner">
          Acceder
          <span class="btn-arrow">→</span>
        </span>
      </button>
    </form>

    <div class="card-footer">
      <div class="status-line">
        <span class="status-dot"></span>
        Conexión segura
      </div>
    </div>
  </div>

  <div class="stamp">© Sistema Académico</div>

</div>

<script>
  // Evita que el botón "atrás" regrese al dashboard después de cerrar sesión.
  // Reemplaza la entrada actual en el historial para que "atrás" no tenga a dónde ir.
  history.replaceState(null, "", window.location.href);

  window.addEventListener("popstate", function () {
    history.pushState(null, "", window.location.href);
  });
</script>
</body>
</html>
